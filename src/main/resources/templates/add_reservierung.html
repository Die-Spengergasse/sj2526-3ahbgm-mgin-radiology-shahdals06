<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <title>Reservierung</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
</head>
<body>
<div class="container">
    <h2>Neue Reservierung</h2>
    <form th:action="@{/reservierung/add}" th:object="${reservierung}" method="post">
        <div class="form-group">
            <label>Patient auswählen:</label>
            <select th:field="*{patient}" class="form-control">
                <option th:each="p : ${patients}" th:value="${p.id}" th:text="${p.vorname + ' ' + p.nachname}"></option>
            </select>
        </div>
        <div class="form-group">
            <label>Gerät auswählen:</label>
            <select th:field="*{geraet}" class="form-control">
                <option th:each="g : ${geraete}"
                        th:value="${g.id}"
                        th:text="${g.bezeichnung + ' (' + g.art + ')'}"></option>
            </select>

        </div>
        <div class="form-group">
            <label>Datum & Uhrzeit:</label>
            <input type="datetime-local" th:field="*{reservierungszeit}" class="form-control">
        </div>
        <div class="form-group">
            <label>Körperregion:</label>
            <select th:field="*{koerperregion}" class="form-control">
                <option value="Kopf">Kopf</option>
                <option value="Thorax">Thorax</option>
                <option value="Abdomen">Abdomen</option>
            </select>
        </div>
        <div class="form-group">
            <label>Kommentar:</label>
            <textarea th:field="*{kommentar}" class="form-control"></textarea>
        </div>
        <button type="submit" class="btn btn-success">Reservierung Speichern</button>
    </form>
</div>
</body>
</html>
